  <line x1="82" y1="46" x2="102" y2="44" stroke="#065F46" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="50" x2="102" y2="50" stroke="#065F46" stroke-width="1.5" stroke-linecap="round"/>
