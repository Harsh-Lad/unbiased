  <ellipse cx="76" cy="40" rx="6" ry="7" fill="white"/>
  <ellipse cx="53" cy="41" rx="3.5" ry="4" fill="#1E293B"/>
  <ellipse cx="77" cy="41" rx="3.5" ry="4" fill="#1E293B"/>
